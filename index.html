<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enes Ayaz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: black;
            animation: backgroundSwitch 10s infinite alternate ease-in-out;
            color: white;
            text-align: center;
        }

        @keyframes backgroundSwitch {
            0% { background-color: black; color: white; }
            25% { background-color: #333; color: white; }
            50% { background-color: gray; color: black; }
            75% { background-color: #ccc; color: black; }
            100% { background-color: white; color: black; }
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .buttons a {
            text-decoration: none;
            padding: 15px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
        }

        .buttons a img {
            width: 40px;
            height: 40px;
        }

        .buttons a:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div>
        <h1>Enes Ayaz</h1>
        <div class="buttons">
            <a href="https://www.instagram.com/enesayaz.16" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
            </a>
            <a href="https://github.com/enes-ayaz" target="_blank">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub">
            </a>
        </div>
    </div>
</body>
</html>

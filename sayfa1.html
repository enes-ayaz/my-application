<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            color: #333;
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 10px;
            text-align: left;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #555;
        }

        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #333;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form action="mailto:egitimenesayaz@gmail.com" method="post" enctype="text/plain">
        <h1>İletişim</h1>
        <label for="name">İsim Soyisim</label>
        <input type="text" id="name" name="name" placeholder="Adınızı ve soyadınızı yazın" required>

        <label for="email">E-posta</label>
        <input type="email" id="email" name="email" placeholder="E-posta adresinizi yazın" required>

        <label for="message">Mesaj</label>
        <textarea id="message" name="message" rows="5" placeholder="Mesajınızı yazın" required></textarea>

        <button type="submit">Gönder</button>

        <a href="index.html">Ana Sayfa</a>
    </form>
</body>
</html>
